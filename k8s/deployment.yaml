apiVersion: apps/v1
kind: Deployment

metadata:
  name: mern-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: mern-app

  template:
    metadata:
      labels:
        app: mern-app

    spec:
      containers:
        - name: mern-app

          image: dharshana20/mern-ecommerce-app:latest

          ports:
            - containerPort: 5000

          env:
            - name: NODE_ENV
              value: "production"

            - name: PORT
              value: "5000"

            - name: MONGO_URI
              value: "mongodb+srv://dharshana:dharshana2030S@cluster1.xxxxx.mongodb.net/mernapp?retryWrites=true&w=majority&appName=Cluster1"

            - name: JWT_SECRET
              value: "mysecretkey"