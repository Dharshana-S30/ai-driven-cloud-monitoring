apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent-sa

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agent-role

rules:

- apiGroups: [""]
  resources:
    - pods
    - services
  verbs:
    - get
    - list
    - watch
    - delete

- apiGroups: ["apps"]
  resources:
    - deployments
  verbs:
    - get
    - list
    - watch
    - patch
    - update

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-agent-binding

subjects:
- kind: ServiceAccount
  name: ai-agent-sa
  namespace: default

roleRef:
  kind: ClusterRole
  name: ai-agent-role
  apiGroup: rbac.authorization.k8s.io